name: CI (Windows)

on: workflow_dispatch

jobs:
  test-windows:
    name: Tests on windows ${{ matrix.go-version }}
    strategy:
      matrix:
        go-version: ['1.25']
    runs-on: windows-2022

    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM
        run: choco install llvm -y

      - name: Unzip V8 libraries
        shell: bash
        run: |
          files=$(find . -name "*.lib.zip" -o -name "libv8*.zip")
          for file in $files; do
            dir=$(dirname "$file")
            echo "Extracting $file to directory $dir"
            unzip -o -d "$dir" "$file"
          done

      - name: Go Test
        env:
          CC: clang
          CXX: clang++
          CGO_ENABLED: '1'
          CGO_CXXFLAGS: "-Werror"
        run: go test -v ./...
